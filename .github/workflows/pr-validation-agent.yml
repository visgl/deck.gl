name: PR Validation Agent

# Triggered by a maintainer adding the 'ai-validate' label to a PR.
# Runs entirely from the base branch — never executes fork code.
on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Generate & Validate Examples
    # Only run when the specific label is added (not any label)
    if: github.event.label.name == 'ai-validate'
    runs-on: ubuntu-latest

    steps:
      # Gate: confirm the person who added the label has write access.
      # This prevents external contributors from triggering costly AI runs
      # by adding labels (which normally requires triage access, but this is belt-and-suspenders).
      - name: Check actor write permission
        uses: actions/github-script@v7
        with:
          script: |
            const {data} = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const authorized = ['admin', 'maintain', 'write'].includes(data.permission);
            if (!authorized) {
              core.setFailed(
                `@${context.actor} has '${data.permission}' permission — write access required to trigger PR Validation Agent.`
              );
            }
            core.info(`@${context.actor} authorized with '${data.permission}' permission.`);

      # Post a placeholder comment immediately so reviewers know the agent is running.
      # We'll update this comment with results at the end.
      - name: Post "running" status comment
        id: start-comment
        uses: actions/github-script@v7
        with:
          script: |
            const {data} = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## 🤖 PR Validation Agent',
                '',
                '⏳ Analyzing changes and generating validation examples...',
                '',
                '_This comment will be updated with results._'
              ].join('\n')
            });
            return data.id;

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install agent dependencies
        working-directory: scripts/pr-validation-agent
        run: npm install --prefer-offline

      - name: Install Playwright browser
        working-directory: scripts/pr-validation-agent
        run: npx playwright install chromium --with-deps

      - name: Run validation agent
        working-directory: scripts/pr-validation-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          START_COMMENT_ID: ${{ steps.start-comment.outputs.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node index.mjs

      # Upload generated HTML examples as downloadable artifacts.
      # Retention is 30 days — enough to outlive any review cycle.
      - name: Upload generated examples
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-validation-examples
          path: scripts/pr-validation-agent/output/
          retention-days: 30
          if-no-files-found: ignore
