name: PR Validation Agent

# Triggered by a maintainer adding the 'ai-validate' label to a PR.
# Runs entirely from the base branch — never executes fork code.
on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write     # needed to push screenshots to the pr-examples branch
  pull-requests: write

jobs:
  validate:
    name: Generate & Validate Examples
    if: github.event.label.name == 'ai-validate'
    runs-on: ubuntu-latest

    steps:
      # Gate: confirm the person who added the label has write access.
      - name: Check actor write permission
        uses: actions/github-script@v7
        with:
          script: |
            const {data} = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const authorized = ['admin', 'maintain', 'write'].includes(data.permission);
            if (!authorized) {
              core.setFailed(
                `@${context.actor} has '${data.permission}' permission — write access required to trigger PR Validation Agent.`
              );
            }
            core.info(`@${context.actor} authorized with '${data.permission}' permission.`);

      - name: Post "running" status comment
        id: start-comment
        uses: actions/github-script@v7
        with:
          script: |
            const {data} = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## 🤖 PR Validation Agent',
                '',
                '⏳ Analyzing changes and generating validation examples...',
                '',
                '_This comment will be updated with results._'
              ].join('\n')
            });
            return data.id;

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install agent dependencies
        working-directory: scripts/pr-validation-agent
        run: npm install --prefer-offline

      - name: Install Playwright browser
        working-directory: scripts/pr-validation-agent
        run: npx playwright install chromium --with-deps

      - name: Run validation agent
        working-directory: scripts/pr-validation-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          START_COMMENT_ID: ${{ steps.start-comment.outputs.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node index.mjs

      # Push screenshots to the pr-examples branch so they have public URLs
      # that can be embedded as <img> tags in the PR comment.
      # Uses a git worktree so the main checkout (base branch) is undisturbed.
      - name: Publish screenshots to pr-examples branch
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SCREENSHOTS="scripts/pr-validation-agent/output/screenshots"

          if [ ! -d "$SCREENSHOTS" ] || [ -z "$(ls -A "$SCREENSHOTS" 2>/dev/null)" ]; then
            echo "No screenshots to publish — skipping"
            exit 0
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          WORKTREE="/tmp/pr-examples-wt"

          if git ls-remote --heads origin pr-examples | grep -q pr-examples; then
            git fetch origin pr-examples --depth=1
            git worktree add "$WORKTREE" pr-examples
          else
            # First run — create the branch as an orphan (no history from main)
            git worktree add --orphan "$WORKTREE" pr-examples
          fi

          mkdir -p "$WORKTREE/pr-${PR_NUMBER}/screenshots"
          cp "$SCREENSHOTS"/*.png "$WORKTREE/pr-${PR_NUMBER}/screenshots/"

          cd "$WORKTREE"
          git add "pr-${PR_NUMBER}/screenshots/"
          git commit -m "screenshots: PR #${PR_NUMBER} [skip ci]" --allow-empty

          # Retry push up to 3 times to handle concurrent PR validations
          for attempt in 1 2 3; do
            git push origin pr-examples && break
            echo "Push attempt $attempt failed — rebasing and retrying"
            git fetch origin pr-examples
            git rebase origin/pr-examples
          done

      - name: Upload generated examples as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-validation-examples
          path: scripts/pr-validation-agent/output/
          retention-days: 30
          if-no-files-found: ignore
