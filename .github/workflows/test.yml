name: test

# On every pull request, but only on push to master
on:
  push:
    branches:
    - master
  pull_request:

permissions:
  contents: read

jobs:
  test-node:
    runs-on: ubuntu-22.04
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable yarn

      - name: Install dependencies
        run: yarn bootstrap

      - name: Build packages
        run: yarn build

      - name: Run tests
        run: |
          yarn lint
          yarn test-ci

      - name: Upload render test failure images
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: render-test-failures
          path: |
            test/render/golden-images/*-fail.png
            test/render/golden-images/*-diff.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Run tape backward compatibility smoke test
        run: yarn test-tape-compat

      - name: Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

  test-website:
    runs-on: ubuntu-22.04
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable yarn

      - name: Install dependencies
        run: yarn bootstrap

      - name: Build packages
        run: yarn build

      - name: Test website build
        run: |
          yarn test-website

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable yarn

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: |
          cd bindings/pydeck
          make setup-env
          make init
          cd ../pydeck-carto
          make init

      - name: Run pydeck tests
        run: |
          cd bindings/pydeck
          make ci

      - name: Run pydeck-carto tests
        run: |
          cd bindings/pydeck-carto
          make ci
