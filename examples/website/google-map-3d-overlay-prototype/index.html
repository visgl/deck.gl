<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Map3D deck.gl overlay prototype</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        overflow: hidden;
        font:
          13px/1.4 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #111;
      }
      gmp-map-3d {
        display: block;
        width: 100%;
        height: 100%;
      }
      .panel {
        position: absolute;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: 360px;
        color: #f8fafc;
        background: rgba(15, 23, 42, 0.86);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 6px;
        padding: 10px;
        backdrop-filter: blur(10px);
      }
      .panel strong {
        display: block;
        margin-bottom: 4px;
      }
      .panel code {
        color: #7dd3fc;
      }
      .toolbar {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 6px;
        color: #f8fafc;
        background: rgba(30, 41, 59, 0.9);
        padding: 6px 8px;
        cursor: pointer;
      }
      button:hover {
        background: rgba(51, 65, 85, 0.95);
      }
      .error {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        color: #fee2e2;
        background: #111827;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import {renderToDOM} from './app.js';
      renderToDOM(document.getElementById('app'));
    </script>
  </body>
</html>
